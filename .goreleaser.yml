# GoReleaser configuration for gong
version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gong
    main: ./cmd/gong
    binary: gong
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Ignore windows/arm64 as it's not commonly used
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: gong
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - Merge pull request
      - Merge branch
  groups:
    - title: 'Features'
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: 'Other'
      order: 999

release:
  github:
    owner: KensoDev
    name: gong
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## Gong {{ .Tag }} Release

    Download the appropriate binary for your platform below.
  footer: |
    ## Installation

    ### macOS (Homebrew)
    ```bash
    brew install KensoDev/tap/gong
    ```

    ### Manual Installation
    Download the appropriate binary for your platform, extract it, and place it in your PATH.

    **Full Changelog**: https://github.com/KensoDev/gong/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - repository:
      owner: KensoDev
      name: homebrew-tap
    folder: Formula
    homepage: https://github.com/KensoDev/gong
    description: CLI tool for managing Jira tickets with git workflows
    license: MIT
    test: |
      system "#{bin}/gong", "--version"
    install: |
      bin.install "gong"
